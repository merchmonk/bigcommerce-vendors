# When changes are pushed to main, trigger the cdk-app deploy workflow so this app is redeployed.
# Requires: In this repo, add secret CDK_APP_DEPLOY_TOKEN (PAT with repo scope, or fine-grained with Actions write on cdk-app).
# Optional: Add variable CDK_APP_REPO (e.g. "your-org/cdk-app") if cdk-app is in a different repo.

name: Trigger deploy on main

on:
  push:
    branches: [main]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cdk-app deploy
        run: |
          CDK_REPO="${{ vars.CDK_APP_REPO }}"
          if [ -z "$CDK_REPO" ]; then CDK_REPO="${GITHUB_REPOSITORY_OWNER}/cdk-app"; fi
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.CDK_APP_DEPLOY_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${CDK_REPO}/dispatches" \
            -d '{"event_type":"deploy"}'
